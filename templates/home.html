<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Recommendation System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <div class="logo">

            <i class="fas fa-film"></i>

            <h1>Movie Recommendation System</h1>

        </div>

    </header>

    <!-- ================= HERO ================= -->

    <section class="hero">

        <h2>Discover Your Next Favorite Movie</h2>

        <p>
            Search for your favourite movie or browse movies by genre.
        </p>

    </section>

    <!-- ================= SEARCH ================= -->

    <section class="search-section">

        <form id="search-form">

            <div class="search-container">

                <input
                    type="text"
                    id="movie-search"
                    placeholder="Search movie..."
                    autocomplete="off">

                <div id="suggestions"></div>

            </div>

            <select id="genre-select">

                <option value="All">All Genres</option>

                <option value="Action">Action</option>
                <option value="Adventure">Adventure</option>
                <option value="Animation">Animation</option>
                <option value="Comedy">Comedy</option>
                <option value="Crime">Crime</option>
                <option value="Drama">Drama</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Family">Family</option>
                <option value="History">History</option>
                <option value="Horror">Horror</option>
                <option value="Music">Music</option>
                <option value="Mystery">Mystery</option>
                <option value="Romance">Romance</option>
                <option value="Science Fiction">Science Fiction</option>
                <option value="Thriller">Thriller</option>
                <option value="War">War</option>
                <option value="Western">Western</option>

            </select>

            <button type="submit">

                <i class="fas fa-search"></i>

                Search

            </button>

        </form>

    </section>

    <!-- ================= MOVIES ================= -->

    <section class="movies-section">

        <div class="section-header">

            <h2 id="section-title">

                Popular Movies

            </h2>

        </div>

        <div id="movie-grid">

        </div>

    </section>

    <!-- ================= LOADER ================= -->

    <div id="loader" class="loader">

        <div class="spinner"></div>

    </div>

    <!-- ================= CARD TEMPLATE ================= -->

    <template id="movie-card-template">

        <div class="movie-card">

            <img
                class="movie-poster"
                src=""
                alt="Movie Poster">

            <div class="movie-info">

                <h3 class="movie-title"></h3>

                <p class="movie-year"></p>

                <p class="movie-genre"></p>

                <div class="movie-rating">

                    ⭐ <span></span>

                </div>

            </div>

        </div>

    </template>

    <!-- ================= FOOTER ================= -->

    <footer>

        <p>

            © 2026 Movie Recommendation System

        </p>

    </footer>

    <script>

        const suggestions = {{ suggestions|tojson }};

    </script>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="{{ url_for('static', filename='js/tmdb.js') }}"></script>

<script src="{{ url_for('static', filename='js/home.js') }}"></script>

</body>

</html>
